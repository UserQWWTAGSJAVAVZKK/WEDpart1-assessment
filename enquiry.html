<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry | The Daily Loaf Bakery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation Menu - Links to all pages -->
    <header>
        <h1>The Daily Loaf Bakery</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="products.html">Products</a>
            <a href="enquiry.html">Enquiry</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <h2>Pre-Order Enquiry</h2>
        <p>Use this form to enquire about custom cake orders or large bread orders. We will get back to you within 24 hours.</p>

        <form action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone">

            <label for="order-type">Order Type:</label>
            <select id="order-type" name="order-type">
                <option value="cake">Custom Celebration Cake</option>
                <option value="large-bread">Large Bread Order (10+ loaves)</option>
                <option value="pastry">Pastry Party Box</option>
                <option value="other">Other</option>
            </select>

            <label for="message">Your Enquiry:</label>
            <textarea id="message" name="message" rows="5" placeholder="Please provide details about your order..." required></textarea>

            <label for="date">Preferred Pickup Date:</label>
            <input type="date" id="date" name="date">

            <button type="submit" class="button">Send Enquiry</button>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 The Daily Loaf Bakery. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
